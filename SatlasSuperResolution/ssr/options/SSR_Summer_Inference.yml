# Inference config for best ESRGAN model without ground truth
name: esrgan_best_optuna_infer_no_gt
model_type: SSRESRGANModel
scale: 4
num_gpu: auto
manual_seed: 0

# Inference Settings
# Root directory containing low-res input PNG images for inference.
# The code searches recursively for .png files under this path.
data_dir: /home/datalab/Datalab/data/inputs

n_lr_images: 1

# Output directory for super-resolved images.
save_path: /home/datalab/zDatalab2/satlas-super-resolution/experiments/esrgan_best_optuna/inference_no_gt

# Generator network settings from best_esrgan_config.yml
network_g:
  type: SSR_RRDBNet
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_block: 23
  num_grow_ch: 32

# Pretrained generator weights to load for inference
path:
  pretrain_network_g: /home/datalab/zDatalab2/satlas-super-resolution/experiments/esrgan_best_optuna/models/net_g_latest.pth
  param_key_g: params_ema
  strict_load_g: false
